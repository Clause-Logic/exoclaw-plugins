[project]
name = "exoclaw-tools-batch"
version = "0.1.2"
description = "Batch/map tool for running tools against multiple inputs concurrently"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.1.0",
]

[project.entry-points."exoclaw.skills"]
etl = "exoclaw_tools_batch.skills:etl"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["exoclaw_tools_batch"]

[tool.hatch.build.targets.sdist]
include = ["exoclaw_tools_batch/"]
