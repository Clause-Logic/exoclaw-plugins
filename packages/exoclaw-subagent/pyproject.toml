[project]
name = "exoclaw-subagent"
version = "0.9.0"
description = "Subagent manager and LLM-facing spawn tool for exoclaw"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.10.1",
    "structlog>=25.0.0",
]

[project.entry-points."exoclaw.skills"]
spawn = "exoclaw_subagent.skills:spawn"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = [
    "exoclaw_subagent/**/*.py",
    "exoclaw_subagent/**/*.md",
    "exoclaw_subagent/py.typed",
]
