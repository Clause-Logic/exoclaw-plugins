[project]
name = "exoclaw-subagent"
version = "0.15.0"
description = "Subagent manager and LLM-facing spawn tool for exoclaw"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # ``>=0.26.3`` for the ``cast(... | None, ...)`` string-quote fix
    # in ``loop._process_message`` — without it every chip-side spawn
    # dies with ``TypeError: unsupported types for __or__:
    # '_Subscriptable', 'NoneType'`` before the child's first LLM call.
    "exoclaw>=0.26.3",
    "structlog>=25.0.0",
]

[project.entry-points."exoclaw.skills"]
spawn = "exoclaw_subagent.skills:spawn"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = [
    "exoclaw_subagent/**/*.py",
    "exoclaw_subagent/**/*.md",
    "exoclaw_subagent/py.typed",
]

[tool.exoclaw]
mp_compat = true
mp_tests_dir = "tests/micro"
