[project]
name = "exoclaw-channel-matrix"
version = "0.1.0"
description = "Matrix channel for exoclaw — vendored from HKUDS/nanobot via codemod"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.28.0",
    "exoclaw-nanobot-compat>=0.1.0",
    "loguru>=0.7",
    "pydantic>=2",
    "matrix-nio[e2e]>=0.25; sys_platform != 'win32'",
    "mistune>=3",
    "nh3>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"
dependencies = ["exoclaw-channel-codemod"]

[tool.hatch.build.targets.wheel]
packages = ["exoclaw_channel_matrix"]

[tool.hatch.build.targets.sdist]
include = [
    "exoclaw_channel_matrix/__init__.py",
    "vendor/",
    "patches/",
    "tests/",
    "conftest.py",
    "hatch_build.py",
    "pyproject.toml",
    "README.md",
]
