[project]
name = "exoclaw-conversation"
version = "0.10.0"
description = "File-backed conversation implementation for exoclaw"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.9.0",
    "structlog>=25.0.0",
    "rich>=14.0.0,<15.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

