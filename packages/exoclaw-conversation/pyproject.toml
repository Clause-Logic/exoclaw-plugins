[project]
name = "exoclaw-conversation"
version = "0.1.0"
description = "File-backed conversation implementation for exoclaw"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.1.0",
    "loguru>=0.7.3,<1.0.0",
    "rich>=14.0.0,<15.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

