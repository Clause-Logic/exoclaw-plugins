[project]
name = "exoclaw-conversation"
version = "0.19.0"
description = "File-backed conversation implementation for exoclaw, runs on CPython + MicroPython"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # 0.26.0 ships the shared MP compat layer (Path, WeakValueDictionary,
    # which, is_executable, etc.) this package now imports.
    "exoclaw>=0.26.0",
    "structlog>=25.0.0",
    "rich>=14.0.0,<15.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Tells the workspace MP CI gate this package runs on MicroPython.
# CI walks ``packages/*/pyproject.toml`` for ``[tool.exoclaw] mp_compat``
# and stages each match into the MP test runner.
[tool.exoclaw]
mp_compat = true
mp_tests_dir = "tests/micro"

