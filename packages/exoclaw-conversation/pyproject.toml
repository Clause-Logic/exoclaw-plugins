[project]
name = "exoclaw-conversation"
version = "0.18.0"
description = "File-backed conversation implementation for exoclaw"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.22.0",
    "structlog>=25.0.0",
    "rich>=14.0.0,<15.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Tells the workspace MP CI gate this package runs on MicroPython.
# CI walks ``packages/*/pyproject.toml`` for ``[tool.exoclaw] mp_compat``
# and stages each match into the MP test runner.
[tool.exoclaw]
mp_compat = true
mp_tests_dir = "tests/micro"

