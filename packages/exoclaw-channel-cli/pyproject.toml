[project]
name = "exoclaw-channel-cli"
version = "0.1.0"
description = "Interactive CLI channel for exoclaw"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.1.0",
    "loguru>=0.7.3,<1.0.0",
    "prompt-toolkit>=3.0.50,<4.0.0",
    "rich>=14.0.0,<15.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

