[project]
name = "exoclaw-tools-cron"
version = "0.8.0"
description = "Cron scheduling tool for exoclaw, runs on CPython + MicroPython"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # 0.26.0 ships ``exoclaw._compat.Path`` / ``TaskLocal`` / etc.
    # that the MP-friendly version of this plugin imports. 0.26.1
    # drops ``asyncio.wait_for`` from the MP HTTP path — without
    # it, an agent making the second LLM streaming request after a
    # cron tool call hits a uasyncio pairheap-double-push assert.
    "exoclaw>=0.26.1",
    "structlog>=25.0.0",
    # ``croniter`` is CPython-only — MP plugins skip ``cron``-style
    # schedules. ``every`` and ``at`` work on both runtimes without
    # a parser.
    "croniter>=6.0.0,<7.0.0",
]

[project.entry-points."exoclaw.skills"]
cron = "exoclaw_tools_cron.skills:cron"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Tells the workspace MP CI gate this package runs on MicroPython.
[tool.exoclaw]
mp_compat = true
mp_tests_dir = "tests/micro"
