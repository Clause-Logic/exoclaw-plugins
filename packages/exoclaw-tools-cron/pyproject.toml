[project]
name = "exoclaw-tools-cron"
version = "0.1.0"
description = "Cron scheduling tool for exoclaw"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.1.0",
    "loguru>=0.7.3,<1.0.0",
    "croniter>=6.0.0,<7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
