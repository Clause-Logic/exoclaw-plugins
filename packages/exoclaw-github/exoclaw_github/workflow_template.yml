# Drop this file into .github/workflows/exoclaw.yml in your repo.
#
# Required secrets:
#   ANTHROPIC_API_KEY  (or OPENAI_API_KEY / GEMINI_API_KEY / etc.)
#
# Optional: create .bot/soul.md in your repo to give the bot a personality.

name: exoclaw

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      message:
        description: "Message to send to the agent"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore bot state
        run: |
          git clone --branch bot-state --depth 1 \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            ~/.nanobot/workspace 2>/dev/null || {
              mkdir -p ~/.nanobot/workspace
              cd ~/.nanobot/workspace
              git init
              git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              git checkout --orphan bot-state
            }

      - name: Copy soul file
        run: |
          if [ -f .bot/soul.md ]; then
            cp .bot/soul.md ~/.nanobot/workspace/soul.md
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install exoclaw-github
        run: pip install exoclaw-github

      - name: Run agent
        run: python -m exoclaw_github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXOCLAW_MODEL: claude-sonnet-4-5
          # EXOCLAW_TRIGGER: "@exoclaw"   # default — remove to respond to all comments
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # EXOCLAW_MODEL: gpt-4o

      - name: Save bot state
        if: always()
        run: |
          cd ~/.nanobot/workspace
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update bot state [skip ci]"
          git push origin bot-state
