[project]
name = "exoclaw-openrouter-search"
version = "0.1.0"
description = "Web search tool for exoclaw using OpenRouter's web search plugin"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.2.1",
    "litellm>=1.0.0",
    "loguru>=0.7.3,<1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
