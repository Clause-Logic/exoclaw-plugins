[project]
name = "exoclaw-openrouter-search"
version = "0.2.2"
description = "Web search tool for exoclaw using OpenRouter's web search plugin"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.10.1",
    # See exoclaw-provider-litellm/pyproject.toml for the floor rationale —
    # bumped past the SQLi-vulnerable window (CVE-2026-42208) to 1.83.10+.
    "litellm>=1.83.10",
    "structlog>=25.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
