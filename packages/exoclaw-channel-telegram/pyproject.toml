[project]
name = "exoclaw-channel-telegram"
version = "0.1.0"
description = "Telegram channel for exoclaw — vendored from HKUDS/nanobot via codemod"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.28.0",
    "exoclaw-nanobot-compat>=0.1.0",
    "loguru>=0.7",
    "pydantic>=2",
    "python-telegram-bot[socks]>=22.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"
dependencies = ["exoclaw-channel-codemod"]

[tool.hatch.build.targets.wheel]
packages = ["exoclaw_channel_telegram"]

[tool.hatch.build.targets.sdist]
include = [
    "exoclaw_channel_telegram/__init__.py",
    "vendor/",
    "patches/",
    "tests/",
    "conftest.py",
    "hatch_build.py",
    "pyproject.toml",
    "README.md",
]
