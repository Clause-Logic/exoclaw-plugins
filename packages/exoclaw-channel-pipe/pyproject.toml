[project]
name = "exoclaw-channel-pipe"
version = "0.1.0"
description = "Non-interactive pipe channel for exoclaw — stdin/stdout, no terminal required"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.1.0",
    "loguru>=0.7.3,<1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
