[project]
name = "exoclaw-channel-pipe"
version = "0.2.0"
description = "Non-interactive pipe channel for exoclaw — stdin/stdout, no terminal required"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.6.0",
    "structlog>=25.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
