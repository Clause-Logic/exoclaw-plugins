[project]
name = "exoclaw-tools-llm-call"
version = "0.1.0"
description = "Single-shot LLM call tool with Jinja2 templating for exoclaw"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.3.0",
    "jinja2>=3.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
