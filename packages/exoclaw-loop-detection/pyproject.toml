[project]
name = "exoclaw-loop-detection"
version = "0.1.0"
description = "Pattern-based loop detection iteration policy for exoclaw — replaces hard iteration caps"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["exoclaw_loop_detection"]

[tool.hatch.build.targets.sdist]
include = ["exoclaw_loop_detection/"]
