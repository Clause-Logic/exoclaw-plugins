[project]
name = "exoclaw-channel-slack"
version = "0.1.0"
description = "Slack channel for exoclaw — vendored from HKUDS/nanobot via codemod"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.28.0",
    "exoclaw-nanobot-compat>=0.1.0",
    "loguru>=0.7",
    "pydantic>=2",
    "slack-sdk>=3.39",
    "slackify-markdown>=0.2",
    "httpx>=0.28",
    "websockets>=16",
    "aiohttp>=3.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"
dependencies = ["exoclaw-channel-codemod"]

[tool.hatch.build.targets.wheel]
packages = ["exoclaw_channel_slack"]

[tool.hatch.build.targets.sdist]
include = [
    "exoclaw_channel_slack/__init__.py",
    "vendor/",
    "patches/",
    "tests/",
    "conftest.py",
    "hatch_build.py",
    "pyproject.toml",
    "README.md",
]
