[project]
name = "exoclaw-firmware"
version = "0.11.0"
description = "Deployable exoclaw image for MicroPython boards (ESP32-S3 and friends)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # Core + HTTP client. ``[http]`` extra pulls in httpx on
    # CPython for tests; on the chip the MP path needs no extra.
    "exoclaw[http]>=0.26.5",
    # Plugins the firmware bundles by default — chat-conversation
    # state, OpenAI-compat provider, and cron self-scheduling.
    # Extra plugins can be staged on top of the firmware tree
    # before flashing.
    "exoclaw-conversation>=0.24.0",
    "exoclaw-provider-openai>=0.4.2",
    "exoclaw-tools-cron>=0.9.0",
    "exoclaw-subagent>=0.15.0",
    "exoclaw-tools-workspace>=0.6.0",
    "exoclaw-screen>=0.1.0",
    "exoclaw-tools-web>=0.1.0",
    "exoclaw-tools-voice>=0.1.0",
    "exoclaw-turn-budget",
]

[project.optional-dependencies]
# Host-preview screen rendering — the unix board's
# ``HostPreviewDisplay`` lifts the ``[host-preview]`` extra from
# ``exoclaw-screen`` (Pillow + qrcode). Chip boards bring their
# own driver and don't need this.
host-preview = ["exoclaw-screen[host-preview]>=0.1.0"]
# Live-mic voice capture for the unix sim's ``LiveMicCapture``.
# CFFI-wrapped PortAudio; CPython-only. Chip boards use
# ``machine.I2S`` and don't need this extra.
host-voice = ["sounddevice>=0.5.5"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["exoclaw_firmware"]

# Tells the workspace MP CI gate this package runs on MicroPython.
[tool.exoclaw]
mp_compat = true
mp_tests_dir = "tests/micro"

# Skills bundled into the firmware image at stage time. Each name
# is a pip-installed package that publishes one or more skills via
# the ``exoclaw.skills`` entry point. The ``stage`` task resolves
# these via ``importlib.metadata`` (host-side) and copies the
# resulting skill directories into ``.stage/exoclaw_firmware/skills/``
# so the chip's ``SkillsLoader`` finds them at
# ``Path(exoclaw_firmware.__file__).parent / "skills"`` — alongside
# any user/agent-managed skills under ``workspace/skills/``.
#
# MicroPython has no ``importlib.metadata`` and no entry-point
# machinery, so this allow-list is the bridge: the host knows about
# pip-installed packages; the chip only knows about files. The bridge
# is explicit by design — adding a new package's skills to the chip
# image requires editing this list.
[tool.exoclaw.firmware]
bundle_skills_from = [
    # Cron's ``add/list/remove/update/enable`` JSON shape lives in a
    # SKILL.md the agent loads on demand. Without bundling, the
    # ``cron`` skill the model would otherwise activate via
    # ``LoadSkillTool`` simply doesn't exist on the chip.
    "exoclaw-tools-cron",
    # Subagent's ``spawn`` skill teaches the agent to dispatch
    # background subagent tasks via ``SpawnTool``. Without bundling,
    # the LLM has no signal that the spawn tool exists.
    "exoclaw-subagent",
    # Workspace's ``read/write/edit/list`` file tools — the
    # ``filesystem`` submodule is MP-compat (chip-friendly 32 KB
    # cap, ``_compat.Path``, no ``difflib``); the ``shell`` and
    # ``web`` submodules are CPython-only and not pulled at
    # package-import time on chip.
    "exoclaw-tools-workspace",
    # Screen's ``screen`` skill teaches the agent the markdown +
    # IAL + Pandoc-fenced-div grammar for the file-backed display
    # surface. Without bundling, the agent has no signal that
    # ``repaint_screen`` exists or how to author content for the
    # panel's resolution + char budget.
    "exoclaw-screen",
    # Web tools — ``web_fetch`` (URL → Markdown via the
    # streaming-feed-able ``html_to_markdown`` state machine) and
    # ``web_search`` (LLM with web-plugin extra_body). Both
    # cross-runtime; chip uses the same ``exoclaw.http`` GET path
    # and the same ``OpenAIStreamingProvider`` the agent
    # already speaks to.
    "exoclaw-tools-web",
    # Voice — captures audio + transcribes via an audio-capable
    # LLM. Bundled so the agent's prompt sees the ``voice``
    # skill (which explains the ``/talk`` token + voice-as-input
    # semantics) even though voice currently triggers from
    # outside the agent's tool surface.
    "exoclaw-tools-voice",
]

[dependency-groups]
dev = [
    "numpy>=2.4.4",
    "pygame>=2.6.1",
]
