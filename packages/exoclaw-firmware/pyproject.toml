[project]
name = "exoclaw-firmware"
version = "0.5.0"
description = "Deployable exoclaw image for MicroPython boards (ESP32-S3 and friends)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # Core + HTTP client. ``[http]`` extra pulls in httpx on
    # CPython for tests; on the chip the MP path needs no extra.
    "exoclaw[http]>=0.26.1",
    # Plugins the firmware bundles by default — chat-conversation
    # state, OpenAI-compat provider, and cron self-scheduling.
    # Extra plugins can be staged on top of the firmware tree
    # before flashing.
    "exoclaw-conversation>=0.21.0",
    "exoclaw-provider-openai>=0.4.1",
    "exoclaw-tools-cron>=0.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["exoclaw_firmware"]

# Tells the workspace MP CI gate this package runs on MicroPython.
[tool.exoclaw]
mp_compat = true
mp_tests_dir = "tests/micro"

# Skills bundled into the firmware image at stage time. Each name
# is a pip-installed package that publishes one or more skills via
# the ``exoclaw.skills`` entry point. The ``stage`` task resolves
# these via ``importlib.metadata`` (host-side) and copies the
# resulting skill directories into ``.stage/exoclaw_firmware/skills/``
# so the chip's ``SkillsLoader`` finds them at
# ``Path(exoclaw_firmware.__file__).parent / "skills"`` — alongside
# any user/agent-managed skills under ``workspace/skills/``.
#
# MicroPython has no ``importlib.metadata`` and no entry-point
# machinery, so this allow-list is the bridge: the host knows about
# pip-installed packages; the chip only knows about files. The bridge
# is explicit by design — adding a new package's skills to the chip
# image requires editing this list.
[tool.exoclaw.firmware]
bundle_skills_from = [
    # Cron's ``add/list/remove/update/enable`` JSON shape lives in a
    # SKILL.md the agent loads on demand. Without bundling, the
    # ``cron`` skill the model would otherwise activate via
    # ``LoadSkillTool`` simply doesn't exist on the chip.
    "exoclaw-tools-cron",
]
