[project]
name = "exoclaw-tools-spawn"
version = "0.2.1"
description = "Subagent spawn tool for exoclaw"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.1.0",
]

[project.entry-points."exoclaw.skills"]
spawn = "exoclaw_tools_spawn.skills:spawn"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
