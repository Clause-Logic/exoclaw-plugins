[project]
name = "exoclaw-tools-spawn"
version = "0.8.0"
description = "Deprecated — re-export shim for exoclaw-subagent's SpawnTool"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw-subagent>=0.9.0",
]

[project.entry-points."exoclaw.skills"]
spawn = "exoclaw_tools_spawn.skills:spawn"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
