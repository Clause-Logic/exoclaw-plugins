[project]
name = "exoclaw-provider-openai"
version = "0.3.0"
description = "OpenAI-compatible LLM provider for exoclaw with streaming request bodies, per-model routing, and CPython + MicroPython support"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # ``exoclaw[http]`` pulls in ``httpx`` on CPython for the
    # ``exoclaw.http.HTTPClient`` backend; MicroPython doesn't need
    # the extra (uses ``asyncio.open_connection`` directly).
    "exoclaw[http]>=0.26.0",
    "json-repair>=0.1.0",
    "structlog>=25.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["exoclaw_provider_openai"]

# Tells the workspace MP CI gate this package runs on MicroPython.
[tool.exoclaw]
mp_compat = true
mp_tests_dir = "tests/micro"
