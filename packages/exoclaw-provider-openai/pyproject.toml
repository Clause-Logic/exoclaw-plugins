[project]
name = "exoclaw-provider-openai"
version = "0.1.0"
description = "Direct-httpx OpenAI-compatible provider for exoclaw with streaming request bodies and per-model routing"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.21.0",
    "httpx>=0.27.0",
    "json-repair>=0.1.0",
    "structlog>=25.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["exoclaw_provider_openai"]
