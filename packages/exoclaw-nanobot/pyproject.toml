[project]
name = "exoclaw-nanobot"
version = "0.12.0"
description = "Full-stack exoclaw bundle — config, provider registry, and one-line wiring"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.10.1",
    "exoclaw-loop-detection",
    "exoclaw-conversation",
    "exoclaw-provider-litellm",
    "exoclaw-channel-cli",
    "exoclaw-channel-heartbeat",
    "exoclaw-tools-workspace>=0.4.0",
    "exoclaw-tools-cron>=0.5.0",
    "exoclaw-tools-message",
    "exoclaw-tools-spawn>=0.6.0",
    "exoclaw-tools-mcp",
    "exoclaw-subagent>=0.6.0",
    "exoclaw-executor-dbos>=0.1.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "structlog>=25.0.0",
]

[project.scripts]
exoclaw-nanobot = "exoclaw_nanobot.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
