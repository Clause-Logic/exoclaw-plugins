[project]
name = "exoclaw-nanobot"
version = "0.32.0"
description = "Full-stack exoclaw bundle — config, provider registry, and one-line wiring"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.26.0",
    "exoclaw-loop-detection",
    "exoclaw-turn-budget>=0.2.0",
    "exoclaw-conversation>=0.24.0",
    "exoclaw-provider-litellm>=0.7.0",
    "exoclaw-channel-cli",
    "exoclaw-channel-heartbeat",
    "exoclaw-tools-workspace>=0.5.0",
    "exoclaw-tools-web>=0.1.0",
    "exoclaw-tools-cron>=0.5.0",
    "exoclaw-tools-message",
    "exoclaw-tools-mcp",
    "exoclaw-subagent>=0.14.0",
    "exoclaw-executor-dbos>=0.15.1",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "structlog>=25.0.0",
]

# Optional channels — install the package with the matching extra, then
# enable the channel in ~/.nanobot/config.json under the matching
# `channels.<name>` section. `create()` instantiates each enabled channel
# from config.
#
#   pip install 'exoclaw-nanobot[slack]'
#   pip install 'exoclaw-nanobot[slack,telegram,discord]'
#   pip install 'exoclaw-nanobot[all-channels]'
[project.optional-dependencies]
slack = ["exoclaw-channel-slack"]
telegram = ["exoclaw-channel-telegram"]
discord = ["exoclaw-channel-discord"]
email = ["exoclaw-channel-email"]
matrix = ["exoclaw-channel-matrix"]
whatsapp = ["exoclaw-channel-whatsapp"]
all-channels = [
    "exoclaw-channel-slack",
    "exoclaw-channel-telegram",
    "exoclaw-channel-discord",
    "exoclaw-channel-email",
    "exoclaw-channel-matrix",
    "exoclaw-channel-whatsapp",
]

[project.scripts]
exoclaw-nanobot = "exoclaw_nanobot.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
