[project]
name = "exoclaw-nanobot"
version = "0.31.0"
description = "Full-stack exoclaw bundle — config, provider registry, and one-line wiring"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.26.0",
    "exoclaw-loop-detection",
    "exoclaw-turn-budget>=0.2.0",
    "exoclaw-conversation>=0.24.0",
    "exoclaw-provider-litellm>=0.7.0",
    "exoclaw-channel-cli",
    "exoclaw-channel-heartbeat",
    "exoclaw-tools-workspace>=0.5.0",
    "exoclaw-tools-web>=0.1.0",
    "exoclaw-tools-cron>=0.5.0",
    "exoclaw-tools-message",
    "exoclaw-tools-mcp",
    "exoclaw-subagent>=0.14.0",
    "exoclaw-executor-dbos>=0.15.1",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "structlog>=25.0.0",
]

[project.scripts]
exoclaw-nanobot = "exoclaw_nanobot.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
