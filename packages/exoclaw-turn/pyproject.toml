[project]
name = "exoclaw-turn"
version = "0.1.0"
description = "Run a single exoclaw agent turn as a library call — no bus, no channels, no persistence"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["exoclaw_turn"]

[tool.hatch.build.targets.sdist]
include = ["exoclaw_turn/"]
