[project]
name = "exoclaw-executor-dbos"
version = "0.15.2"
description = "DBOS-backed durable executor for exoclaw — turns and tool calls survive restarts"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # 0.30.2 is the first release with the lifecycle-hook contract in a stable
    # shape: 0.30.0 put the hook seams on the Conversation Protocol (broke
    # structural conformance across the workspace), 0.30.1 moved them off, and
    # 0.30.2 dropped run_effect as the wrong seam. 0.29.0 added the
    # ``on_before_finish`` AgentLoop hook this durability test exercises. 0.26.0
    # changed ``ToolResult.content_file`` from ``Path`` to ``str | None`` for
    # cross-runtime serialisation.
    "exoclaw>=0.30.2",
    "exoclaw-subagent>=0.12.0",
    "dbos>=1.0.0",
    "structlog>=24.0.0",
    "uuid-utils>=0.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
