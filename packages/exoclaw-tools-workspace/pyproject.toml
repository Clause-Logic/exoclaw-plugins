[project]
name = "exoclaw-tools-workspace"
version = "0.7.0"
description = "File, shell, and web tools for exoclaw — filesystem subset is MicroPython-compat"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # ``>=0.26.4`` for the ``Path`` shim's ``read_text`` / ``write_text``
    # / ``relative_to`` / ``iterdir`` surface that ``filesystem`` uses on
    # both runtimes. The shell+web modules pull additional CPython-only
    # deps below.
    "exoclaw>=0.26.4",
    "structlog>=25.0.0",
    "httpx>=0.28.0,<1.0.0",
    "readability-lxml>=0.8.1",
]

[project.entry-points."exoclaw.skills"]
workspace = "exoclaw_tools_workspace.skills:workspace"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = [
    "exoclaw_tools_workspace/**/*.py",
    "exoclaw_tools_workspace/**/*.md",
]

[tool.exoclaw]
mp_compat = true
mp_tests_dir = "tests/micro"

