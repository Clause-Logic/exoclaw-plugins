[project]
name = "exoclaw-tools-workspace"
version = "0.3.0"
description = "File, shell, and web tools for exoclaw"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "exoclaw>=0.6.0",
    "structlog>=25.0.0",
    "httpx>=0.28.0,<1.0.0",
    "readability-lxml>=0.8.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

