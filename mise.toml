[tools]
uv = "latest"

[tasks.lint]
description = "Type check with ty and lint with ruff (set PACKAGE=<name>)"
run = [
    "uv run ty check packages/$PACKAGE",
    "uv run ruff check packages/$PACKAGE",
]

[tasks.format]
description = "Format code with ruff (set PACKAGE=<name>)"
run = "uv run ruff format packages/$PACKAGE"

[tasks.check-format]
description = "Check formatting without writing changes (set PACKAGE=<name>)"
run = "uv run ruff format --check packages/$PACKAGE"

[tasks.test]
description = "Run tests (set PACKAGE=<name>)"
run = "uv run pytest packages/$PACKAGE"
