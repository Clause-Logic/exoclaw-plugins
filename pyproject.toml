[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
exoclaw-conversation = { workspace = true }
exoclaw-firmware = { workspace = true }
exoclaw-provider-litellm = { workspace = true }
exoclaw-provider-openai = { workspace = true }
exoclaw-channel-cli = { workspace = true }
exoclaw-channel-heartbeat = { workspace = true }
exoclaw-tools-workspace = { workspace = true }
exoclaw-tools-cron = { workspace = true }
exoclaw-tools-message = { workspace = true }
exoclaw-tools-spawn = { workspace = true }
exoclaw-tools-mcp = { workspace = true }
exoclaw-subagent = { workspace = true }
exoclaw-github = { workspace = true }
exoclaw-tools-batch = { workspace = true }
exoclaw-tools-llm-call = { workspace = true }
exoclaw-channel-pipe = { workspace = true }
exoclaw-loop-detection = { workspace = true }
exoclaw-executor-dbos = { workspace = true }
exoclaw-screen = { workspace = true }
exoclaw-tools-web = { workspace = true }
exoclaw-tools-voice = { workspace = true }
exoclaw-turn-budget = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0.0,<10.0.0",
    "pytest-asyncio>=1.3.0,<2.0.0",
    "pytest-cov>=7.0.0",
    "pytest-timeout>=2.3.0",
    "mypy>=1.0.0",
    "ruff>=0.9.0",
    "ty>=0.0.0a1",
    # Host-side renderer deps for ``exoclaw-screen``'s ``[host-preview]``
    # extra. Pulled into dev (not just the extra) so ty can resolve
    # the lazy ``from PIL import …`` / ``import qrcode`` lines in
    # ``renderer/pillow.py`` without a workspace-wide extras flag
    # at lint time. Chip MP boards never load these — the
    # renderer module's imports are method-local and gated.
    "pillow>=10.0.0",
    "qrcode>=7.4.0",
    "sounddevice>=0.5.5",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages"]
timeout = 10
addopts = "--import-mode=importlib"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.ty.src]
# Loadtest / one-off dev scripts pull in optional deps (matplotlib,
# psutil) that aren't workspace dependencies and use stub LLMProvider
# implementations that don't structurally satisfy the protocol. These
# are dev tooling, not shipped code — skip them in the type check.
#
# ``packages/*/boards/**`` holds MicroPython-only entry points
# (``import machine``, ``import network``, ``import ntptime``,
# ``time.sleep_ms``, etc.) that don't resolve under CPython's ty.
# Skip them — the MP gate exercises the imports on the actual
# runtime.
exclude = [
    "**/scripts/**",
    "**/boards/**",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "TID251"]
ignore = ["E501"]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"asyncio.create_task" = {msg = "Use exoclaw.utils.create_isolated_task() instead. asyncio.create_task copies the caller's contextvars, which leaks DBOS workflow context (and structlog / per-turn bindings) into background tasks. The wrapper passes context=Context() so each task starts with a fresh contextvars snapshot."}

[tool.ruff.lint.per-file-ignores]
# Test files commonly use create_task for setup/teardown patterns
# where DBOS context isn't a concern.
"packages/*/tests/**" = ["TID251"]
