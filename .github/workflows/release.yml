name: Release

on:
  push:
    tags: ['*-v*']

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.tag.outputs.package }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG##*-v}"
          PACKAGE="${TAG%-v*}"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version matches pyproject.toml
        run: |
          PACKAGE="${{ steps.tag.outputs.package }}"
          EXPECTED="${{ steps.tag.outputs.version }}"
          ACTUAL=$(grep '^version' "packages/$PACKAGE/pyproject.toml" | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Version mismatch: tag=$EXPECTED pyproject.toml=$ACTUAL"
            exit 1
          fi

      - name: Install dependencies
        run: uv sync

      - name: Check formatting
        run: mise run check-format

      - name: Lint
        run: mise run lint
        env:
          PACKAGE: ${{ steps.tag.outputs.package }}

      - name: Test
        run: mise run test
        env:
          PACKAGE: ${{ steps.tag.outputs.package }}

      - name: Build
        run: uv build --package ${{ steps.tag.outputs.package }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}

  registry:
    needs: build
    runs-on: ubuntu-latest
    environment: registry
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release with wheels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ needs.build.outputs.package }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$PACKAGE $VERSION" \
            --notes "Release ${PACKAGE} ${VERSION}. Wheels are surfaced through the [Clause-Logic registry](https://clause-logic.github.io/registry/pypi/simple/) for uv consumers and via PyPI for everyone else." \
            dist/*

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: Clause-Logic
          repositories: registry

      - name: Trigger registry rebuild
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh api repos/Clause-Logic/registry/dispatches -f event_type=rebuild
